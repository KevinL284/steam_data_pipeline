services:
  api:
    build: .
    container_name: steam-data-pipeline-api

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - db

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16
    container_name: steam-data-pipeline-db

    environment:
      POSTGRES_DB: steam_data
      POSTGRES_USER: steam_user
      POSTGRES_PASSWORD: steam_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
